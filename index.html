<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход - FX-АСУБАНК</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/login.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body data-page="login">

<div class="login-screen">
  <div class="login-brand">
    <div class="brand-mark">
      <span class="brand-mark-fx">FX</span>
      <span class="brand-mark-dot"></span>
    </div>

    <div class="brand-headline">
      <span class="brand-h-line">Подсистема</span>
      <span class="brand-h-line">обработки</span>
      <span class="brand-h-line">FX-сделок</span>
    </div>

    <div class="brand-bg-grid"></div>
  </div>

  <div class="login-pane">
<div class="login-card">
      <h1 class="login-title">Добро пожаловать.</h1>
      <p class="login-sub">Войдите с учётной записью identity-provider.</p>

      <form id="login-form" class="form-grid">
        <div class="form-row">
          <label class="form-label" for="login-email">Email</label>
          <input id="login-email" class="form-input" type="email" placeholder="trader@demo.local" autocomplete="username" required>
        </div>
        <div class="form-row">
          <label class="form-label" for="login-password">Пароль</label>
          <input id="login-password" class="form-input" type="password" placeholder="Пароль" autocomplete="current-password" required>
        </div>
        <div class="form-row">
          <button type="submit" class="btn primary" style="width:100%">Войти</button>
        </div>
      </form>

      <p class="login-sub" style="margin-top:1rem;font-size:0.85rem">
        Демо: <span class="mono">trader@demo.local</span> / <span class="mono">DemoPassword1!</span>
        (см. README fx-deal-manager)
      </p>

      <div class="login-helpers">
        <button class="link-btn" data-toast="Восстановление пароля|Свяжитесь с администратором ИБ: ib@asubank.local|info">Забыли пароль?</button>
      </div>
    </div>

  </div>
</div>

<div id="toast-stack" class="toast-stack"></div>
<div id="modal-mount"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/views.js"></script>
</body>
</html>
